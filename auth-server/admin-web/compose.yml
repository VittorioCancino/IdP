services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "${DATABASE_PORT:-5433}:5432"
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-admin_web}
      POSTGRES_USER: ${DATABASE_USER:-admin_web}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-admin_web}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -h 127.0.0.1 -U ${DATABASE_USER:-admin_web} -d ${DATABASE_NAME:-admin_web}",
        ]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  postgres_data:
